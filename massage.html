<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hairhustler</title>
    <link rel="stylesheet" href="mystyle.css">
    <link rel="icon" href="images/WhatsApp Image 2026-04-17 at 11.33.49 PM.jpeg">
</head>
<body class="messagpag">

<h6 class="h6">we offer massage services using the finest oils and tools.</h6> 

<img src="images/WhatsApp Image 2026-04-18 at 7.26.56 PM.jpeg" class="massimg">



     <label for="toogle" class="titlebox" > click to show our price </label>
     <input type="checkbox" id="toogle">

     <div class="price-box">
        <div class="item">
            <span>massage 1hour</span>
            <span>25$</span>

        </div>

        <div class="item">
            <span>massage 30 minutes</span>
            ,<span>20$</span>
        </div>

        
     </div>

     <a href="https://wa.me/message/YGOLOW3GK33BP1" >

        <button class="butt">whatsapp to book</button>
        
     </a>

<h2 style="text-align:center;">Book Your Appointment</h2>

<div class="booking-container">

<input type="text" id="name" placeholder="Enter your name">

<input type="tel" id="phone" placeholder="Enter your phone number">

<select id="service" onchange="calculatePrice()">

<option value="">Choose Service</option>

<option value="25">Massage 1 Hour - 25$</option>

<option value="20">Massage 30 Minutes - 20$</option>

</select>

<input type="date" id="date">

<input type="time" id="time">

<h2 class="total-price" id="total">
Total Price: 0$
</h2>

<button onclick="bookAppointment()" class="book-btn">
Confirm Booking
</button>

<p id="message"></p>

</div>

<script>

function calculatePrice(){

const service =
document.getElementById("service").value;

document.getElementById("total").innerText =
"Total Price: " + service + "$";

}

function bookAppointment(){

const name =
document.getElementById("name").value;

const service =
document.getElementById("service").value;

if(name === "" || service === ""){

alert("Please complete all fields");
return;

}

document.getElementById("message").innerText =
"Massage Appointment Booked ✅";

}

</script>



</body>
</html>
